        <div style={{background:`linear-gradient(135deg,${C.panel},#0F0D00,${C.panel})`,border:`2px solid ${C.gold}60`,borderRadius:8,padding:"28px 36px",position:"relative",overflow:"hidden",marginBottom:36}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:GG}}/>
          <div style={{display:"flex",alignItems:"center",gap:28,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:240}}>
              <div style={{fontSize:9,color:C.gold,letterSpacing:4,textTransform:"uppercase",marginBottom:7}}>🔥 Complete Vault — Best Value</div>
              <h3 style={{fontSize:"clamp(18px,2.5vw,26px)",fontWeight:900,color:C.cream,marginBottom:9,letterSpacing:2}}>All 10 Blueprints — One Price</h3>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
                {PRODUCTS.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:3,background:C.bg,border:`1px solid ${C.border}`,borderRadius:100,padding:"2px 8px"}}><span style={{fontSize:11}}>{p.emoji}</span><span style={{fontSize:8,color:C.muted}}>{p.title.split(" ")[0]}</span></div>)}
              </div>
              <p style={{fontSize:12,color:C.muted,lineHeight:1.65}}>Every blueprint in one purchase. $474 value for $197. Save $277.</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,flexShrink:0}}>
              <div style={{textAlign:"center"}}>
                <div style={{...GT,fontSize:48,fontWeight:900,lineHeight:1}}>$197</div>
                <div style={{fontSize:13,color:C.dim,textDecoration:"line-through"}}>$474 value</div>
                <div style={{fontSize:11,color:C.green,fontWeight:700}}>You save $277</div>
              </div>
              <a href={LINKS["B5"]} target="_blank" rel="noreferrer"
                style={{padding:"14px 32px",background:GG,color:"#000",fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",borderRadius:2,textDecoration:"none",fontFamily:"Georgia,serif"}}>
                💳 Get Complete Vault
              </a>
              <div style={{fontSize:9,color:C.dim}}>🛡️ 30-day guarantee · ⚡ Instant delivery</div>
            </div>
          </div>
        </div>
      </section>

      {/* Products */}
      <section id="products" style={{padding:"0 24px 72px",maxWidth:1280,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:8,color:C.gold,letterSpacing:6,textTransform:"uppercase",marginBottom:9}}>The Vault</div>
          <h2 style={{fontSize:"clamp(20px,3.5vw,34px)",fontWeight:900,color:C.cream,letterSpacing:2,marginBottom:12}}>Choose Your Blueprint</h2>
          <div style={{width:52,height:2,background:GG,margin:"0 auto 20px"}}/>
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
            {CATS.map(cat=>(
              <button key={cat} onClick={()=>setFilter(cat)}
                style={{background:filter===cat?GG:"transparent",color:filter===cat?"#000":C.muted,border:`1px solid ${filter===cat?C.goldBri:C.border}`,
                  padding:"6px 14px",fontSize:8,letterSpacing:2,textTransform:"uppercase",cursor:"pointer",borderRadius:2,fontFamily:"Georgia,serif",transition:"all 0.2s"}}>
                {cat}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
          {items.map(item=><Card key={item.id} item={item} onView={setPreview}/>)}
        </div>
      </section>

      {/* Footer */}
      <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:"24px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:9}}>
          <VaultIcon size={14}/><span style={{...GT,fontSize:11,fontWeight:900,letterSpacing:4,textTransform:"uppercase"}}>Hustle Vault</span>
        </div>
        <p style={{fontSize:9,color:C.dim,marginBottom:8}}>hustlevault.app · 10 Premium Digital Blueprints · Powered by Stripe</p>
        <div style={{fontSize:8,color:"#1A1A28"}}>© 2026 Hustle Vault · Sun Marketing LLC · All rights reserved.</div>
      </footer>

      {/* Live notification */}
      <div style={{position:"fixed",bottom:18,left:18,zIndex:500}}>
        <div key={tick} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 13px",display:"flex",alignItems:"center",gap:7,boxShadow:"0 8px 28px rgba(0,0,0,0.5)",maxWidth:250,animation:"slideIn 0.4s ease"}}>
          <div style={{width:5,height:5,borderRadius:"50%",background:C.green,flexShrink:0,animation:"pulse 2s infinite"}}/>
          <span style={{fontSize:9,color:C.muted}}>{notifs[tick%notifs.length]}</span>
        </div>
      </div>

      {preview&&<Modal item={preview} onClose={()=>setPreview(null)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
